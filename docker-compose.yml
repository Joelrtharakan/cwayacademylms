version: '3.8'

services:
  # PostgreSQL database (replaces SQLite in dev)
  postgres:
    image: postgres:16-alpine
    container_name: cway_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     cway
      POSTGRES_PASSWORD: cwaydev
      POSTGRES_DB:       cway_lms
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cway -d cway_lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: cway_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (optional, GUI for Postgres)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cway_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@cway.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
